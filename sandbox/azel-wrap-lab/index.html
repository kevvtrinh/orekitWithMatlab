&lt;script&gt;
(function () {
  &quot;use strict&quot;;

  var root = document.getElementById(&quot;azel-wrap-lab&quot;);
  var canvas = document.getElementById(&quot;awl-canvas&quot;);
  var ctx = canvas.getContext(&quot;2d&quot;);
  var runButton = document.getElementById(&quot;awl-run&quot;);
  var resetButton = document.getElementById(&quot;awl-reset&quot;);
  var rotateButton = document.getElementById(&quot;awl-rotate&quot;);
  var phaseEl = document.getElementById(&quot;awl-phase&quot;);
  var anglesEl = document.getElementById(&quot;awl-angles&quot;);
  var cableEl = document.getElementById(&quot;awl-cable&quot;);
  var errorEl = document.getElementById(&quot;awl-error&quot;);
  var modeButtons = Array.prototype.slice.call(root.querySelectorAll(&quot;[data-mode]&quot;));

  var inputs = {
    azMin: document.getElementById(&quot;awl-az-min&quot;),
    azMax: document.getElementById(&quot;awl-az-max&quot;),
    elMin: document.getElementById(&quot;awl-el-min&quot;),
    elMax: document.getElementById(&quot;awl-el-max&quot;),
    cableTurns: document.getElementById(&quot;awl-cable-turns&quot;),
    rate: document.getElementById(&quot;awl-rate&quot;),
    p1Az: document.getElementById(&quot;awl-p1-az&quot;),
    p1El: document.getElementById(&quot;awl-p1-el&quot;),
    trackRate: document.getElementById(&quot;awl-track-rate&quot;),
    trackTime: document.getElementById(&quot;awl-track-time&quot;),
    p2Az: document.getElementById(&quot;awl-p2-az&quot;),
    p2El: document.getElementById(&quot;awl-p2-el&quot;)
  };

  var p = readParameters();
  var mode = &quot;manual&quot;;
  var running = false;
  var lastFrame = 0;
  var historyClock = 0;
  var drag = null;
  var rotateMode = false;
  var view = { yawDeg: -35, pitchDeg: 20 };
  var state;

  function finiteValue(input, fallback) {
    var n = Number(input.value);
    return isFinite(n) ? n : fallback;
  }

  function clamp(v, lo, hi) {
    return Math.max(lo, Math.min(hi, v));
  }

  function wrap180(deg) {
    var value = ((deg + 180) % 360 + 360) % 360 - 180;
    return value === -180 ? 180 : value;
  }

  function rawAzMin() {
    return -p.cableTurns * 360;
  }

  function rawAzMax() {
    return p.cableTurns * 360;
  }

  function geometryAllowsAz(raw) {
    var wrapped = wrappedForEnvelope(raw);
    return wrapped &gt;= p.azMin - 1e-9 &amp;&amp; wrapped &lt;= p.azMax + 1e-9;
  }

  function wrappedForEnvelope(raw) {
    var wrapped = wrap180(raw);
    if (Math.abs(wrapped - 180) &lt; 1e-9 &amp;&amp; p.azMax &lt; 180 &amp;&amp; p.azMin &lt;= -180) return -180;
    return wrapped;
  }

  function applyAzLimits(raw) {
    var wrapped = wrappedForEnvelope(raw);
    var limitedWrapped = clamp(wrapped, p.azMin, p.azMax);
    var turn = Math.round((raw - limitedWrapped) / 360);
    return clamp(limitedWrapped + turn * 360, rawAzMin(), rawAzMax());
  }

  function applyManualAzLimits(current, requested) {
    if (p.azMax - p.azMin &gt;= 360 - 1e-9) {
      return clamp(requested, rawAzMin(), rawAzMax());
    }
    var turn = Math.floor((current - p.azMin + 1e-9) / 360);
    var low = Math.max(rawAzMin(), p.azMin + turn * 360);
    var high = Math.min(rawAzMax(), p.azMax + turn * 360);
    return clamp(requested, low, high);
  }

  function readParameters() {
    var previous = p || {
      azMin: -180, azMax: 180, elMin: -90, elMax: 90,
      cableTurns: 1.5, rate: 55,
      p1Az: 170, p1El: 35, trackRate: 22, trackTime: 16,
      p2Az: -150, p2El: 55
    };
    var next = {};
    Object.keys(inputs).forEach(function (key) {
      next[key] = finiteValue(inputs[key], previous[key]);
    });
    next.azMin = clamp(next.azMin, -180, 179);
    next.azMax = clamp(next.azMax, next.azMin + 1, 180);
    next.elMin = clamp(next.elMin, -90, 89);
    next.elMax = clamp(next.elMax, next.elMin + 1, 90);
    next.cableTurns = clamp(next.cableTurns, 0.5, 6);
    next.rate = clamp(next.rate, 1, 180);
    next.p1Az = clamp(next.p1Az, -180, 180);
    next.p1El = clamp(next.p1El, -90, 90);
    next.trackRate = clamp(next.trackRate, -50, 50);
    next.trackTime = clamp(next.trackTime, 2, 30);
    next.p2Az = clamp(next.p2Az, -180, 180);
    next.p2El = clamp(next.p2El, -90, 90);
    return next;
  }

  function syncParameterFields() {
    Object.keys(inputs).forEach(function (key) {
      inputs[key].value = String(p[key]);
    });
  }

  function equivalentAngles(wrapped) {
    var base = clamp(wrappedForEnvelope(wrapped), p.azMin, p.azMax);
    var values = [];
    for (var k = -8; k &lt;= 8; k++) {
      var value = base + 360 * k;
      if (value &gt;= rawAzMin() - 1e-9 &amp;&amp; value &lt;= rawAzMax() + 1e-9) values.push(value);
    }
    if (!values.length) values.push(clamp(base, rawAzMin(), rawAzMax()));
    return values;
  }

  function nearestEquivalent(wrapped, from) {
    return equivalentAngles(wrapped).reduce(function (best, candidate) {
      return Math.abs(candidate - from) &lt; Math.abs(best - from) ? candidate : best;
    });
  }

  function trackGeometryFeasible(start, end) {
    var samples = Math.max(2, Math.ceil(Math.abs(end - start) / 2));
    for (var i = 0; i &lt;= samples; i++) {
      if (!geometryAllowsAz(start + (end - start) * i / samples)) return false;
    }
    return true;
  }

  function planTrack(includeNext) {
    var starts = equivalentAngles(p.p1Az);
    var mechanicalMin = rawAzMin();
    var mechanicalMax = rawAzMax();
    var span = Math.max(1, mechanicalMax - mechanicalMin);
    var center = 0;
    var best = null;

    starts.forEach(function (start) {
      var end = start + p.trackRate * p.trackTime;
      var low = Math.min(start, end);
      var high = Math.max(start, end);
      var trackGeometryAllowed = trackGeometryFeasible(start, end);
      var feasible = low &gt;= mechanicalMin &amp;&amp; high &lt;= mechanicalMax &amp;&amp; trackGeometryAllowed;
      var margin = Math.min(low - mechanicalMin, mechanicalMax - high);
      var violation = Math.max(0, mechanicalMin - low) + Math.max(0, high - mechanicalMax);
      if (!trackGeometryAllowed) violation += 360;
      var acquire = Math.abs(start) / p.rate;
      var trackCost = acquire + (feasible ? 80 / (margin + 20) : 1000 + violation * 4);

      var p2Candidates = includeNext ? equivalentAngles(p.p2Az) : [null];
      p2Candidates.forEach(function (p2Raw) {
        var cost = trackCost;
        if (p2Raw == null) {
          cost += Math.abs(end - center) / span * 5;
        } else {
          cost += Math.abs(p2Raw - end) / p.rate;
          cost += Math.abs(p2Raw - center) / span * 5;
          cost += 35 / (Math.min(p2Raw - mechanicalMin, mechanicalMax - p2Raw) + 20);
        }
        if (!best || cost &lt; best.cost) {
          best = {
            p1Raw: start,
            p1EndRaw: end,
            p2Raw: p2Raw,
            feasible: feasible,
            margin: margin,
            cost: cost
          };
        }
      });
    });
    return best;
  }

  function resetSimulation() {
    running = false;
    lastFrame = 0;
    historyClock = 0;
    var initialAz = applyAzLimits(0);
    state = {
      time: 0,
      az: initialAz,
      el: clamp(20, p.elMin, p.elMax),
      azVel: 0,
      elVel: 0,
      cmdAz: initialAz,
      cmdEl: clamp(20, p.elMin, p.elMax),
      requestedAz: 0,
      phase: &quot;Manual drag&quot;,
      dwell: 0,
      trackElapsed: 0,
      limitHit: false,
      history: [],
      plan: null
    };

    if (mode === &quot;slew&quot;) {
      state.phase = &quot;Slew to P1&quot;;
      state.plan = { p1Raw: nearestEquivalent(p.p1Az, state.az), p2Raw: null, feasible: true };
    } else if (mode === &quot;track&quot; || mode === &quot;lookahead&quot;) {
      state.phase = &quot;Acquire P1&quot;;
      state.plan = planTrack(mode === &quot;lookahead&quot;);
    }
    pushHistory();
    updateRunButton();
    draw();
  }

  function updateRunButton() {
    runButton.disabled = mode === &quot;manual&quot;;
    runButton.textContent = mode === &quot;manual&quot; ? &quot;Drag vector&quot; : (running ? &quot;Pause&quot; : &quot;Run&quot;);
    modeButtons.forEach(function (button) {
      button.setAttribute(&quot;aria-pressed&quot;, String(button.getAttribute(&quot;data-mode&quot;) === mode));
    });
    rotateButton.setAttribute(&quot;aria-pressed&quot;, String(rotateMode));
    canvas.style.cursor = rotateMode ? &quot;grab&quot; : (mode === &quot;manual&quot; ? &quot;crosshair&quot; : &quot;default&quot;);
  }

  function axisStep(position, velocity, target, maxRate, acceleration, dt) {
    var error = target - position;
    if (Math.abs(error) &lt; 1e-6 &amp;&amp; Math.abs(velocity) &lt; 1e-6) {
      return { position: target, velocity: 0 };
    }
    var brakeRate = Math.sqrt(Math.max(0, 2 * acceleration * Math.abs(error)));
    var desiredVelocity = Math.sign(error) * Math.min(maxRate, brakeRate);
    var velocityDelta = clamp(desiredVelocity - velocity, -acceleration * dt, acceleration * dt);
    var nextVelocity = velocity + velocityDelta;
    var nextPosition = position + nextVelocity * dt;
    if ((target - position) * (target - nextPosition) &lt;= 0) {
      nextPosition = target;
      nextVelocity = 0;
    }
    return { position: nextPosition, velocity: nextVelocity };
  }

  function settled(azTarget, elTarget) {
    var az = applyAzLimits(azTarget);
    var el = clamp(elTarget, p.elMin, p.elMax);
    return Math.abs(az - state.az) &lt; 0.7 &amp;&amp;
      Math.abs(el - state.el) &lt; 0.7 &amp;&amp;
      Math.abs(state.azVel) &lt; 1.5 &amp;&amp; Math.abs(state.elVel) &lt; 1.5;
  }

  function p1Elevation(trackElapsed) {
    if (mode !== &quot;track&quot; &amp;&amp; mode !== &quot;lookahead&quot;) return p.p1El;
    var wave = Math.sin(Math.PI * clamp(trackElapsed / p.trackTime, 0, 1));
    return p.p1El + 12 * wave;
  }

  function updateCommand(dt) {
    if (mode === &quot;slew&quot;) {
      if (state.phase === &quot;Slew to P1&quot; || state.phase === &quot;Hold P1&quot;) {
        state.requestedAz = state.plan.p1Raw;
        state.cmdEl = p.p1El;
        if (settled(state.requestedAz, state.cmdEl)) {
          state.dwell += dt;
          state.phase = &quot;Hold P1&quot;;
          if (state.dwell &gt;= 1.5) {
            state.plan.p2Raw = nearestEquivalent(p.p2Az, state.az);
            state.phase = &quot;Slew to P2&quot;;
            state.dwell = 0;
          }
        }
      } else if (state.phase === &quot;Slew to P2&quot;) {
        state.requestedAz = state.plan.p2Raw;
        state.cmdEl = p.p2El;
        if (settled(state.requestedAz, state.cmdEl)) {
          state.phase = &quot;P2 acquired&quot;;
          running = false;
        }
      }
    } else if (mode === &quot;track&quot; || mode === &quot;lookahead&quot;) {
      if (state.phase === &quot;Acquire P1&quot;) {
        state.requestedAz = state.plan.p1Raw;
        state.cmdEl = p.p1El;
        if (settled(state.requestedAz, state.cmdEl)) {
          state.phase = &quot;Track P1&quot;;
          state.trackElapsed = 0;
        }
      } else if (state.phase === &quot;Track P1&quot;) {
        state.trackElapsed += dt;
        state.requestedAz = state.plan.p1Raw + p.trackRate * state.trackElapsed;
        state.cmdEl = p1Elevation(state.trackElapsed);
        if (state.trackElapsed &gt;= p.trackTime) {
          if (mode === &quot;lookahead&quot;) {
            state.phase = &quot;Slew to known P2&quot;;
          } else {
            state.phase = &quot;P1 track complete&quot;;
            running = false;
          }
        }
      } else if (state.phase === &quot;Slew to known P2&quot;) {
        state.requestedAz = state.plan.p2Raw;
        state.cmdEl = p.p2El;
        if (settled(state.requestedAz, state.cmdEl)) {
          state.phase = &quot;P2 acquired&quot;;
          running = false;
        }
      }
    }

    var limitedAz = applyAzLimits(state.requestedAz);
    state.limitHit = Math.abs(limitedAz - state.requestedAz) &gt; 1e-6 ||
      !geometryAllowsAz(state.requestedAz) ||
      state.cmdEl &lt; p.elMin || state.cmdEl &gt; p.elMax;
    state.cmdAz = limitedAz;
    state.cmdEl = clamp(state.cmdEl, p.elMin, p.elMax);
  }

  function update(dt) {
    state.time += dt;
    updateCommand(dt);
    var acceleration = Math.max(20, p.rate * 2.5);
    var azStep = axisStep(state.az, state.azVel, state.cmdAz, p.rate, acceleration, dt);
    var elStep = axisStep(state.el, state.elVel, state.cmdEl, p.rate, acceleration, dt);
    state.az = clamp(azStep.position, rawAzMin(), rawAzMax());
    state.el = clamp(elStep.position, p.elMin, p.elMax);
    state.azVel = azStep.velocity;
    state.elVel = elStep.velocity;
    historyClock += dt;

  }

  function pushHistory() {

      t: state.time,
      az: state.az,
      el: state.el,
      cmd: state.cmdAz

  function simulationFrame(now) {
    if (!running) {
      updateRunButton();
      draw();
      return;
    }
    if (!lastFrame) lastFrame = now;
    var dt = Math.min(0.04, Math.max(0.001, (now - lastFrame) / 1000));
    lastFrame = now;
    update(dt);
    draw();

  }

  function cssToken(name, fallback) {
    var value = getComputedStyle(root).getPropertyValue(name).trim();
    return value || fallback;
  }

  function theme() {
    var foreground = cssToken(&quot;--foreground&quot;, &quot;CanvasText&quot;);
    var primary = cssToken(&quot;--viz-series-1&quot;, cssToken(&quot;--primary&quot;, foreground));
    return {
      foreground: foreground,
      muted: cssToken(&quot;--muted-foreground&quot;, foreground),
      border: cssToken(&quot;--border&quot;, foreground),
      card: cssToken(&quot;--card&quot;, &quot;Canvas&quot;),
      primary: primary,
      series2: cssToken(&quot;--viz-series-2&quot;, primary),
      series3: cssToken(&quot;--viz-series-3&quot;, primary),

  function direction(azDeg, elDeg) {
    var az = azDeg * Math.PI / 180;
    var el = elDeg * Math.PI / 180;
    var c = Math.cos(el);
    return { x: c * Math.sin(az), y: c * Math.cos(az), z: Math.sin(el) };
  }

  function geometry(w, h) {
    var yaw = view.yawDeg * Math.PI / 180;
    var pitch = view.pitchDeg * Math.PI / 180;
    return {
      cx: w * 0.24,
      cy: h * 0.36,
      radius: Math.min(h * 0.28, w * 0.21),
      east: [-Math.sin(yaw), Math.cos(yaw), 0],
      north: [-Math.sin(pitch) * Math.cos(yaw), -Math.sin(pitch) * Math.sin(yaw), Math.cos(pitch)],
      forward: [Math.cos(pitch) * Math.cos(yaw), Math.cos(pitch) * Math.sin(yaw), Math.sin(pitch)]

  }

  function project(v, g) {
    return {
      x: g.cx + (v.x * g.east[0] + v.y * g.east[1] + v.z * g.east[2]) * g.radius,
      y: g.cy - (v.x * g.north[0] + v.y * g.north[1] + v.z * g.north[2]) * g.radius,
      depth: v.x * g.forward[0] + v.y * g.forward[1] + v.z * g.forward[2]
    };
  }

  function strokeCurve(points, front, color, alpha, width, g) {
    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = width;
    ctx.beginPath();
    var penDown = false;
    points.forEach(function (v) {
      var point = project(v, g);
      var visible = front ? point.depth &gt;= 0 : point.depth &lt; 0;

        penDown = false;
      } else if (!penDown) {
        ctx.moveTo(point.x, point.y);
        penDown = true;
      } else {
        ctx.lineTo(point.x, point.y);
      }
    });
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function drawAllowedSurface(g, colors) {
    var azSpan = p.azMax - p.azMin;
    var azStart = azSpan &gt;= 360 ? 0 : p.azMin;
    var azEnd = azSpan &gt;= 360 ? 360 : p.azMax;
    var step = 10;
    ctx.fillStyle = colors.primary;
    for (var el = p.elMin; el &lt; p.elMax; el += step) {
      var el2 = Math.min(p.elMax, el + step);
      for (var az = azStart; az &lt; azEnd; az += step) {
        var az2 = Math.min(azEnd, az + step);
        var vectors = [direction(az, el), direction(az2, el),
          direction(az2, el2), direction(az, el2)];
        var points = vectors.map(function (v) { return project(v, g); });
        var depth = points.reduce(function (sum, point) { return sum + point.depth; }, 0) / 4;
        if (depth &lt; 0) continue;

  function drawSphere(g, colors) {
    ctx.fillStyle = colors.card;
    ctx.globalAlpha = 0.42;
    ctx.beginPath();
    ctx.arc(g.cx, g.cy, g.radius, 0, Math.PI * 2);

    for (var lon = 0; lon &lt; 360; lon += 30) {

    ctx.stroke();
    ctx.globalAlpha = 1;

    ctx.fillStyle = colors.muted;
    ctx.textAlign = &quot;left&quot;;
    ctx.textBaseline = &quot;top&quot;;
    ctx.fillText(&quot;3D DIRECTION SPHERE&quot;, 14, 12);
    var geometricSpan = Math.min(360, Math.max(0, p.azMax - p.azMin));
    ctx.fillText(&quot;Allowed az &quot; + geometricSpan.toFixed(0) + &quot;° · el &quot; +
      p.elMin.toFixed(0) + &quot;°…&quot; + p.elMax.toFixed(0) + &quot;°&quot;, 14, 28);
  }

  function drawTrail(g, colors) {
    if (state.history.length &lt; 2) return;
    ctx.strokeStyle = colors.series2;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.62;
    ctx.beginPath();
    state.history.forEach(function (sample, index) {
      var point = project(direction(sample.az, sample.el), g);
      if (index === 0) ctx.moveTo(point.x, point.y);
      else ctx.lineTo(point.x, point.y);
    });

    ctx.globalAlpha = 1;
  }

  function targetP1() {
    var raw = p.p1Az;
    var el = p.p1El;
    if (state.plan &amp;&amp; (mode === &quot;track&quot; || mode === &quot;lookahead&quot;)) {
      raw = state.plan.p1Raw;
      if (state.phase === &quot;Track P1&quot; || state.trackElapsed &gt; 0) {
        raw += p.trackRate * state.trackElapsed;
        el = p1Elevation(state.trackElapsed);

  }

  function drawTarget(label, az, el, color, g) {
    var point = project(direction(az, el), g);
    ctx.fillStyle = color;
    ctx.globalAlpha = point.depth &gt;= 0 ? 1 : 0.42;
    ctx.beginPath();
    ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = color;
    ctx.textAlign = &quot;left&quot;;
    ctx.textBaseline = &quot;bottom&quot;;
    ctx.fillText(label, point.x + 8, point.y - 5);
  }

  function drawVector(g, colors) {
    var point = project(direction(state.az, state.el), g);
    ctx.strokeStyle = state.limitHit ? colors.destructive : colors.primary;
    ctx.fillStyle = state.limitHit ? colors.destructive : colors.primary;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(g.cx, g.cy);
    ctx.lineTo(point.x, point.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(point.x, point.y, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = colors.foreground;
    ctx.textAlign = &quot;left&quot;;
    ctx.textBaseline = &quot;top&quot;;
    ctx.fillText(&quot;RAW &quot; + state.az.toFixed(1) + &quot;°&quot;, point.x + 10, point.y + 7);
    ctx.fillStyle = colors.muted;
    ctx.fillText(&quot;WRAPPED &quot; + wrap180(state.az).toFixed(1) + &quot;°&quot;, point.x + 10, point.y + 23);
  }

  function drawAzElFrame(w, h, colors) {
    var left = w * 0.59;
    var right = w - 18;
    var top = 48;
    var bottom = h * 0.64;

    function xFor(az) {
      return left + (clamp(az, -180, 180) + 180) / 360 * (right - left);
    }
    function yFor(el) {
      return bottom - (clamp(el, -90, 90) + 90) / 180 * (bottom - top);
    }

    ctx.fillStyle = colors.muted;
    ctx.textAlign = &quot;left&quot;;
    ctx.textBaseline = &quot;top&quot;;
    ctx.fillText(&quot;2D AZ / EL FRAME&quot;, left, 12);
    ctx.fillText(&quot;wrapped pointing coordinates&quot;, left, 28);

    ctx.fillStyle = colors.primary;
    ctx.globalAlpha = 0.10;
    ctx.fillRect(xFor(p.azMin), yFor(p.elMax),
      xFor(p.azMax) - xFor(p.azMin), yFor(p.elMin) - yFor(p.elMax));
    ctx.globalAlpha = 1;

    ctx.strokeStyle = colors.border;
    ctx.lineWidth = 1;
    [-180, -90, 0, 90, 180].forEach(function (az) {
      var x = xFor(az);
      ctx.globalAlpha = az === 0 ? 0.42 : 0.24;
      ctx.beginPath();
      ctx.moveTo(x, top);
      ctx.lineTo(x, bottom);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = colors.muted;
      ctx.textAlign = &quot;center&quot;;
      ctx.textBaseline = &quot;top&quot;;
      ctx.fillText(az + &quot;°&quot;, x, bottom + 5);

      var y = yFor(el);

      ctx.beginPath();
      ctx.moveTo(left, y);
      ctx.lineTo(right, y);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = colors.muted;
      ctx.textAlign = &quot;right&quot;;
      ctx.textBaseline = &quot;middle&quot;;
      ctx.fillText(el + &quot;°&quot;, left - 6, y);
    });

    ctx.strokeStyle = colors.primary;
    ctx.globalAlpha = 0.72;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(xFor(p.azMin), yFor(p.elMax),
      xFor(p.azMax) - xFor(p.azMin), yFor(p.elMin) - yFor(p.elMax));
    ctx.globalAlpha = 1;

    if (state.history.length &gt; 1) {
      ctx.strokeStyle = colors.series2;
      ctx.globalAlpha = 0.58;
      ctx.lineWidth = 2;
      ctx.beginPath();
      state.history.forEach(function (sample, index) {
        var x = xFor(wrap180(sample.az));
        var y = yFor(sample.el);
        if (index === 0 || Math.abs(wrap180(sample.az) - wrap180(state.history[index - 1].az)) &gt; 180) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function mark(label, az, el, color, shape) {
      var x = xFor(wrap180(az));
      var y = yFor(el);

      ctx.fillStyle = color;
      ctx.lineWidth = 2;

        ctx.lineTo(x + 5, y);
        ctx.moveTo(x, y - 5);
        ctx.lineTo(x, y + 5);

        ctx.arc(x, y, shape === &quot;current&quot; ? 7 : 5, 0, Math.PI * 2);

        ctx.textAlign = &quot;left&quot;;
        ctx.textBaseline = &quot;bottom&quot;;

    mark(&quot;P1&quot;, p1.az, p1.el, colors.series3, &quot;target&quot;);
    mark(&quot;P2&quot;, p.p2Az, p.p2El, colors.series2, &quot;target&quot;);
    mark(&quot;&quot;, state.cmdAz, state.cmdEl, colors.series3, &quot;cross&quot;);
    mark(&quot;VECTOR&quot;, state.az, state.el,
      state.limitHit ? colors.destructive : colors.primary, &quot;current&quot;);
  }

  function azToGaugeY(az, top, bottom) {
    return bottom - (az - rawAzMin()) / Math.max(1, rawAzMax() - rawAzMin()) * (bottom - top);
  }

  function drawCableGauge(w, h, colors) {
    var x = w * 0.49;
    var top = 48;
    var bottom = h * 0.66;
    var y = azToGaugeY(state.az, top, bottom);
    var commandY = azToGaugeY(state.cmdAz, top, bottom);
    var centerY = azToGaugeY(0, top, bottom);

    ctx.fillStyle = colors.muted;
    ctx.textAlign = &quot;center&quot;;
    ctx.textBaseline = &quot;bottom&quot;;
    ctx.fillText(&quot;CABLE AZ&quot;, x, top - 12);

    ctx.strokeStyle = colors.border;
    ctx.globalAlpha = 0.32;
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(x, top);
    ctx.lineTo(x, bottom);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x - 10, centerY);
    ctx.lineTo(x + 10, centerY);
    ctx.stroke();
    ctx.globalAlpha = 1;

    ctx.strokeStyle = colors.series3;
    ctx.globalAlpha = 0.78;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(x - 16, commandY);
    ctx.lineTo(x + 16, commandY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    ctx.fillStyle = state.limitHit ? colors.destructive : colors.primary;
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = colors.muted;
    ctx.textAlign = &quot;left&quot;;
    ctx.textBaseline = &quot;middle&quot;;
    ctx.fillText(rawAzMax().toFixed(0) + &quot;°&quot;, x + 14, top);
    ctx.fillText(&quot;0°&quot;, x + 14, centerY);
    ctx.fillText(rawAzMin().toFixed(0) + &quot;°&quot;, x + 14, bottom);

    var coilX = w * 0.55;
    var coilMid = (top + bottom) / 2;
    var currentTurns = state.az / 360;
    var coilEndY = azToGaugeY(state.az, top, bottom);
    ctx.strokeStyle = colors.border;
    ctx.globalAlpha = 0.35;
    ctx.beginPath();
    ctx.moveTo(coilX, top);
    ctx.lineTo(coilX, bottom);
    ctx.stroke();
    ctx.globalAlpha = 1;

    var samples = Math.max(2, Math.ceil(Math.abs(currentTurns) * 48));
    ctx.strokeStyle = colors.series2;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var i = 0; i &lt;= samples; i++) {
      var f = i / samples;
      var angle = state.az * Math.PI / 180 * f;
      var px = coilX + Math.sin(angle) * 15;
      var py = coilMid + (coilEndY - coilMid) * f;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.fillStyle = colors.muted;
    ctx.textAlign = &quot;center&quot;;
    ctx.textBaseline = &quot;top&quot;;
    ctx.fillText(&quot;CABLE&quot;, coilX, bottom + 10);
    ctx.fillText(currentTurns.toFixed(2) + &quot; turns&quot;, coilX, bottom + 26);
  }

  function drawHistory(w, h, colors) {
    var left = 18;
    var right = w - 18;
    var top = h - 82;
    var bottom = h - 18;
    var rows = state.history.length ? state.history : [{ t: 0, az: state.az, cmd: state.cmdAz }];
    var tMax = rows[rows.length - 1].t;
    var tMin = Math.max(0, tMax - 30);
    var visible = rows.filter(function (row) { return row.t &gt;= tMin; });
    if (visible.length === 1) visible = [visible[0], visible[0]];

    function hx(t) {
      return left + (t - tMin) / Math.max(1, tMax - tMin) * (right - left);
    }
    function hy(az) {
      return bottom - (az - rawAzMin()) / Math.max(1, rawAzMax() - rawAzMin()) * (bottom - top);
    }

    ctx.strokeStyle = colors.border;
    ctx.globalAlpha = 0.28;
    ctx.lineWidth = 1;
    [top, bottom, hy(0)].forEach(function (y) {
      ctx.beginPath();
      ctx.moveTo(left, y);
      ctx.lineTo(right, y);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;

    ctx.strokeStyle = colors.series3;
    ctx.globalAlpha = 0.62;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    visible.forEach(function (row, index) {
      if (index === 0) ctx.moveTo(hx(row.t), hy(row.cmd));
      else ctx.lineTo(hx(row.t), hy(row.cmd));
    });
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    ctx.strokeStyle = colors.series2;
    ctx.lineWidth = 2;
    ctx.beginPath();
    visible.forEach(function (row, index) {
      if (index === 0) ctx.moveTo(hx(row.t), hy(row.az));
      else ctx.lineTo(hx(row.t), hy(row.az));
    });
    ctx.stroke();

    ctx.fillStyle = colors.muted;
    ctx.textAlign = &quot;left&quot;;
    ctx.textBaseline = &quot;bottom&quot;;
    ctx.fillText(&quot;RAW AZ HISTORY · solid actual / dashed command&quot;, left, top - 7);
  }

  function updateStatus() {
    var margin = Math.min(state.az - rawAzMin(), rawAzMax() - state.az);
    var error = Math.hypot(state.cmdAz - state.az, state.cmdEl - state.el);
    phaseEl.textContent = state.phase + (state.limitHit ? &quot; · LIMIT&quot; : &quot;&quot;);
    anglesEl.textContent = &quot;Raw az &quot; + state.az.toFixed(1) + &quot;° · wrapped &quot; +
      wrap180(state.az).toFixed(1) + &quot;° · el &quot; + state.el.toFixed(1) + &quot;°&quot;;
    cableEl.textContent = (state.az / 360).toFixed(2) + &quot; / ±&quot; +
      p.cableTurns.toFixed(2) + &quot; turns · &quot; + Math.max(0, margin).toFixed(0) + &quot;° margin&quot;;
    errorEl.textContent = &quot;Error &quot; + error.toFixed(1) + &quot;°&quot;;
  }

  function draw() {
    var rect = canvas.getBoundingClientRect();

      canvas.height = Math.round(h * dpr);

    ctx.clearRect(0, 0, w, h);

    var g = geometry(w, h);
    drawSphere(g, colors);
    drawTrail(g, colors);
    var p1 = targetP1();
    drawTarget(&quot;P1&quot;, p1.az, p1.el, colors.series3, g);
    drawTarget(&quot;P2&quot;, p.p2Az, p.p2El, colors.series2, g);
    drawVector(g, colors);
    drawCableGauge(w, h, colors);
    drawAzElFrame(w, h, colors);
    drawHistory(w, h, colors);
    updateStatus();
  }

  modeButtons.forEach(function (button) {
    button.addEventListener(&quot;click&quot;, function () {
      mode = button.getAttribute(&quot;data-mode&quot;);
      resetSimulation();
    });
  });

  runButton.addEventListener(&quot;click&quot;, function () {
    if (mode === &quot;manual&quot;) return;
    running = !running;
    updateRunButton();
    if (running) {
      lastFrame = 0;
      requestAnimationFrame(simulationFrame);
    }
  });

  rotateButton.addEventListener(&quot;click&quot;, function () {
    rotateMode = !rotateMode;
    updateRunButton();
    draw();
  });

  resetButton.addEventListener(&quot;click&quot;, function () {
    view.yawDeg = -35;
    view.pitchDeg = 20;
    resetSimulation();
  });

  Object.keys(inputs).forEach(function (key) {
    inputs[key].addEventListener(&quot;change&quot;, function () {
      p = readParameters();
      syncParameterFields();
      resetSimulation();
    });
  });

  canvas.addEventListener(&quot;pointerdown&quot;, function (event) {
    if (!rotateMode &amp;&amp; mode !== &quot;manual&quot;) return;
    drag = { kind: rotateMode ? &quot;camera&quot; : &quot;vector&quot;, x: event.clientX, y: event.clientY };
    canvas.setPointerCapture(event.pointerId);
    canvas.style.cursor = &quot;grabbing&quot;;
  });

  canvas.addEventListener(&quot;pointermove&quot;, function (event) {
    if (!drag) return;
    var dx = event.clientX - drag.x;
    var dy = event.clientY - drag.y;
    drag.x = event.clientX;
    drag.y = event.clientY;
    if (drag.kind === &quot;camera&quot;) {
      view.yawDeg += dx * 0.55;
      view.pitchDeg = clamp(view.pitchDeg - dy * 0.4, -85, 85);
      draw();
      return;
    }
    var requested = state.az + dx * 1.35;
    state.az = applyManualAzLimits(state.az, requested);
    state.el = clamp(state.el - dy * 0.75, p.elMin, p.elMax);
    state.cmdAz = state.az;
    state.requestedAz = requested;
    state.cmdEl = state.el;
    state.limitHit = Math.abs(state.az - requested) &gt; 1e-6;
    state.time += 0.04;
    state.phase = state.limitHit ? &quot;Manual drag · AZ STOP&quot; : &quot;Manual drag&quot;;
    pushHistory();
    draw();
  });

  function endDrag() {
    drag = null;
    updateRunButton();
  }
  canvas.addEventListener(&quot;pointerup&quot;, endDrag);
  canvas.addEventListener(&quot;pointercancel&quot;, endDrag);

  if (typeof ResizeObserver !== &quot;undefined&quot;) {
    new ResizeObserver(draw).observe(canvas);
  } else {
    window.addEventListener(&quot;resize&quot;, draw);
  }

  syncParameterFields();
  resetSimulation();
})();

  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);

      return;
    }

    if (activeTrigger === trigger) {
